# install.conf — maps repo category folders to user system directories
#
# Format:  <category>/*    <destination>
# Lines starting with # are ignored.
#
# Linux destinations use ~, $HOME, $XDG_CONFIG_HOME etc.
# Windows destinations use $env:USERPROFILE, $env:APPDATA, $env:LOCALAPPDATA etc.
# Pick one set and keep a separate install.conf per platform, or maintain both
# and comment out whichever doesn't apply to your system.

# ── Linux ──────────────────────────────────────────────────────────────────────
skills/*        ~/.roo/skills
agents/*        ~/.agents
commands/*      ~/.roo/commands
prompts/*       ~/.roo/prompts
# mcps/*          ~/.config/mcps

# ── Windows (uncomment and adjust as needed) ───────────────────────────────────
# skills/*      $env:USERPROFILE\.roo\skills
# agents/*      $env:USERPROFILE\.agents
# commands/*    $env:USERPROFILE\.roo\commands
# prompts/*     $env:USERPROFILE\.roo\prompts
# mcps/*        $env:APPDATA\mcps